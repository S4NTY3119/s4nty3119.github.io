<!DOCTYPE html>
<html>
<head>
  <title>GetYourUGC</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      color: #aaa;
    }

    input, textarea {
      width: 300px;
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      background: #1e1e1e;
      color: white;
    }

    textarea {
      height: 120px;
      resize: none;
    }

    button {
      padding: 10px 20px;
      background: #4CAF50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <h1>GetYourUGC 🚀</h1>
  <p>Submit your UGC file below!</p>

  <form action="https://formspree.io/f/mkoppawp" method="POST">

    <input type="text" name="roblox_username" placeholder="Your Roblox Username" required><br>

    <textarea name="ugc_file" placeholder="Paste your UGC file here..." required></textarea><br>

    <button type="submit">Submit </button>

  </form>

</body>
</html>
